[colors]
background = #00000000
background-alt = #373B41
foreground = #FFFFFF
primary = ${env:POLYBAR_PRIMARY:#FFFFFF}
secondary = #00C6f4
alert = #A54242
disabled = #707880

[bar/mybar]
width = 100%
height = 30pt
radius = 0

dpi = 120

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = ${colors.background}

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.primary}

font-0 = "JetBrainsMono Nerd Font:size=16;weight=bold"

modules-left = xworkspaces mode
modules-center = xwindow
modules-right = microphone volblue brightness battery wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

; Active workspace (highlighted with a box and underline)
label-active = %name%
label-active-background = ${colors.background}
label-active-foreground = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 1
label-active-margin = 0.2

; Occupied workspace (dimmed but still visible)
label-occupied = %name%
label-occupied-foreground = ${colors.primary}
label-occupied-padding = 1
label-occupied-margin = 0.2

; Urgent workspace (attention-grabbing)
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-urgent-margin = 0.2

; Empty workspace (minimal but still visible)
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1
label-empty-margin = 0.2

; Optional: Add separator spacing
label-separator = |

[module/mode]
type = custom/script
exec =  ~/.config/polybar/.scripts/get-mode.sh
interval = 1
label-foreground = #770000

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.primary}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
label-foreground = ${colors.primary}

[module/microphone]
type = custom/script
exec = pactl get-source-mute @DEFAULT_SOURCE@ | awk '{if ($2 == "yes") print "ÔĄĪ"; else print "ÔĄį"}'
click-left = wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-
interval = 1
label-foreground = ${colors.primary}

[module/volblue]
type = custom/script
exec =  ~/.config/polybar/.scripts/volume-bluetooth.sh
interval = 1
label-foreground = ${colors.primary}

[module/brightness]
type = custom/script
exec = brightnessctl get | awk '{printf "‚óČ %d%", $1/255*100}'

interval = 1
label-foreground = ${colors.primary}

[module/battery]
type = custom/script
exec =  ~/.config/polybar/.scripts/battery-status.sh
interval = 30
label-foreground = ${colors.primary}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}
label-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%
label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
label-foreground = ${colors.primary}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected
label-foreground = ${colors.primary}

[module/wlan]
type = custom/script
exec =  ~/.config/polybar/.scripts/wlan-status.sh
interval = 10
label-foreground = ${colors.primary}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}% %local_ip%
label-foreground = ${colors.primary}

[module/date]
type = custom/script
exec = date +"%b %d, %I:%M %p"
interval = 60
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
#pseudo-transparency = true

; vim:ft=dosini
