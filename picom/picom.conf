backend = "glx";
vsync = true;
glx-use-copysubbuffer-mesa = true;

glx-copy-from-front = true;
glx-swap-method = 2;
xrender-sync = true;
xrender-sync-fence = true;

#corner-radius = 10;
#rounded-corners = true;

fading = true;
fade-in-step = 0.1;
fade-out-step = 0.1;
fade-delta = 12;

inactive-opacity = 0.98;
active-opacity = 1.0;
frame-opacity = 0.98;


#opacity-rule = [
#  "80:class_g = 'Alacritty'"
#];
